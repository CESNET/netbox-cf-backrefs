# Publish the package to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in GitHub.
#
# ── One-time setup (do this before the first release) ────────────────────────
#  1. PyPI → your account → "Publishing" → "Add a pending publisher"
#     (the project does not need to exist yet; the first publish creates it):
#         PyPI Project Name: netbox-cf-backrefs
#         Owner:             CESNET
#         Repository name:   netbox-cf-backrefs
#         Workflow name:     publish.yml
#         Environment name:  pypi
#  2. GitHub → repo Settings → Environments → create an environment named "pypi".
#     (Already configured for CESNET/netbox-cf-backrefs.)
#
# ── Releasing ────────────────────────────────────────────────────────────────
#  The version is single-sourced from netbox_cf_backrefs/version.py.
#  To release X.Y.Z: set __version__ = "X.Y.Z", commit, tag vX.Y.Z, then publish
#  a GitHub Release pointing at that tag. The build job fails if the release tag
#  and the package version disagree.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(grep -oP '^__version__\s*=\s*"\K[^"]+' netbox_cf_backrefs/version.py | head -n1 || true)"
          echo "Release tag version: ${tag_version}"
          echo "Package version:     ${pkg_version}"
          if [ -z "${pkg_version}" ]; then
            echo "::error::Could not parse __version__ from netbox_cf_backrefs/version.py"
            exit 1
          fi
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Release tag '${GITHUB_REF_NAME}' does not match netbox_cf_backrefs/version.py (${pkg_version})."
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
