{% load render_table from django_tables2 %}
<div id="object_list"
     hx-target="this"
     hx-select="#object_list"
     hx-swap="outerHTML">
  <div class="table-responsive">{% render_table table 'inc/table.html' %}</div>
  {% include 'inc/paginator.html' with paginator=table.paginator page=table.page %}
</div>
